name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Upgrade pip
        run: ./.venv/bin/python -m pip install --upgrade pip
        if: runner.os != 'Windows'

      - name: Upgrade pip on Windows
        run: .\.venv\Scripts\python.exe -m pip install --upgrade pip
        if: runner.os == 'Windows'

      - name: Install project
        run: ./.venv/bin/python -m pip install -e .[dev]
        if: runner.os != 'Windows'

      - name: Install project on Windows
        run: .\.venv\Scripts\python.exe -m pip install -e .[dev]
        if: runner.os == 'Windows'

      - name: Package import smoke
        run: ./.venv/bin/python -c "import graphix_lab; print(graphix_lab.__all__)"
        if: runner.os != 'Windows'

      - name: Package import smoke on Windows
        run: .\.venv\Scripts\python.exe -c "import graphix_lab; print(graphix_lab.__all__)"
        if: runner.os == 'Windows'

      - name: CLI help smoke
        run: ./.venv/bin/python -m graphix_lab.cli --help
        if: runner.os != 'Windows'

      - name: CLI help smoke on Windows
        run: .\.venv\Scripts\python.exe -m graphix_lab.cli --help
        if: runner.os == 'Windows'

      - name: Ruff check
        run: ./.venv/bin/python -m ruff check .
        if: runner.os != 'Windows'

      - name: Ruff check on Windows
        run: .\.venv\Scripts\python.exe -m ruff check .
        if: runner.os == 'Windows'

      - name: Ruff format check
        run: ./.venv/bin/python -m ruff format . --check
        if: runner.os != 'Windows'

      - name: Ruff format check on Windows
        run: .\.venv\Scripts\python.exe -m ruff format . --check
        if: runner.os == 'Windows'

      - name: Pytest
        run: ./.venv/bin/python -m pytest
        if: runner.os != 'Windows'

      - name: Pytest on Windows
        run: .\.venv\Scripts\python.exe -m pytest
        if: runner.os == 'Windows'

      - name: Pyright
        run: ./.venv/bin/python -m pyright
        if: runner.os != 'Windows'

      - name: Pyright on Windows
        run: .\.venv\Scripts\python.exe -m pyright
        if: runner.os == 'Windows'

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Upgrade pip
        run: ./.venv/bin/python -m pip install --upgrade pip

      - name: Install project
        run: ./.venv/bin/python -m pip install -e .[dev]

      - name: Dependency vulnerability audit
        run: ./.venv/bin/python -m graphix_lab.cli security

  qiskit-optional:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Upgrade pip
        run: ./.venv/bin/python -m pip install --upgrade pip

      - name: Install project with optional Qiskit extra
        run: ./.venv/bin/python -m pip install -e .[qiskit,dev]

      - name: Optional Qiskit pytest subset
        run: ./.venv/bin/python -m pytest tests/unit/test_qiskit_adapter.py tests/smoke/test_examples.py -k qiskit
